name: Staging Deploy

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: staging-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint · type-check · build
    runs-on: ubuntu-latest

    env:
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_APP_URL: https://mbody-staging.onrender.com
      NEXT_PUBLIC_APP_ENV: staging
      NEXT_PUBLIC_USE_MOCK_DATA: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Build
        run: pnpm build

  deploy:
    name: trigger Render (staging)
    runs-on: ubuntu-latest
    needs: check
    environment: staging

    steps:
      - name: Trigger Render deploy hook
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: curl --fail --silent --show-error -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Note
        if: ${{ !secrets.RENDER_DEPLOY_HOOK_URL }}
        run: echo "Render auto-deploys from the staging branch when enabled in the dashboard."
